name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Root package (tests + pack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify pack contents (prepack + dry-run)
        run: npm pack --dry-run

      - name: Create tarball for artifact
        run: npm pack

      - uses: actions/upload-artifact@v4
        with:
          name: pilot-research-npm-package
          path: "*.tgz"
          if-no-files-found: error

  dashboard:
    name: Dashboard (test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        working-directory: dashboard
        run: npm ci

      - name: Test
        working-directory: dashboard
        run: npm test

      - name: Production build
        working-directory: dashboard
        run: npm run build
