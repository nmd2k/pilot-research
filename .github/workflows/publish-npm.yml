name: Publish npm

# Publishes when either:
#   1. Push a semver tag v*.*.* (commit must already contain matching "version" in package.json).
#   2. Actions → Publish npm → Run workflow → uncheck dry_run (needs NPM_TOKEN).
#
# CI only tests and uploads a .tgz artifact — it never runs npm publish.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run = npm pack checks only; publish = upload to registry (needs NPM_TOKEN)"
        type: choice
        options:
          - dry-run
          - publish
        default: dry-run

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install (root)
        run: npm ci

      - name: Test (root)
        run: npm test

      - name: Publish to npm (semver tag push)
        if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (manual — mode=publish)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'publish'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish dry-run (manual — mode=dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'dry-run'
        run: npm publish --dry-run --access public
